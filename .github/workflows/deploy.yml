name: Deploy

on:
  push:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS (set in GitHub → Settings → Secrets → Actions):
#
#   VERCEL_TOKEN        — from vercel.com/account/tokens
#   VERCEL_ORG_ID       — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID   — from .vercel/project.json after `vercel link`
#   RENDER_DEPLOY_HOOK  — from Render dashboard → Service → Settings → Deploy Hook
#
# REQUIRED VARS (GitHub → Settings → Variables):
#   VITE_SUPABASE_URL        — your Supabase project URL
#   VITE_SUPABASE_ANON_KEY   — your Supabase anon key
#   VITE_API_BASE_URL        — your Render backend URL e.g. https://paperiq-backend.onrender.com/api/v1
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Frontend → Vercel ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_NAME: PaperIQ
        run: bun run build

      - name: Deploy to Vercel (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ── Backend → Render ───────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        # Render auto-deploys on every push to the connected branch via the
        # deploy hook URL. Calling it here makes the CI status visible in GitHub.
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # If RENDER_DEPLOY_HOOK is not set yet, this step is skipped gracefully
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
