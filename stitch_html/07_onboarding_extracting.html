<script>
        // Progress Ring Animation Logic
        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress >= 95) {
                progress = 95; // Wait at 95 until server would complete
                clearInterval(interval);
            }
            setProgress(progress);
        }, 1000);

        // Status Log Rotation
        const log = document.getElementById('status-log');
        const statuses = [
            "Identifying Subject Codes...",
            "Mapping Exam Dates from PDF...",
            "Validating Academic Calendar...",
            "Generating AI Study Pathways...",
            "Cross-referencing Syllabus...",
            "Optimizing Focus Schedule..."
        ];
        let currentStatusIndex = 0;

        function updateStatus() {
            if (currentStatusIndex >= statuses.length) return;
            
            const prevItem = log.querySelector('div:last-child');
            if (prevItem) {
                const icon = prevItem.querySelector('span:first-child');
                icon.className = "material-symbols-outlined text-[18px] text-primary";
                icon.innerHTML = "check_circle";
                icon.classList.remove('animate-pulse', 'bg-primary-container', 'w-1.5', 'h-1.5', 'rounded-full');
            }

            const newItem = document.createElement('div');
            newItem.className = "flex items-center gap-3 text-on-surface opacity-0 transition-opacity duration-500";
            newItem.innerHTML = `
                <span class="w-1.5 h-1.5 rounded-full bg-primary-container animate-pulse"></span>
                <span class="font-data-label text-data-label">${statuses[currentStatusIndex]}</span>
            `;
            
            log.appendChild(newItem);
            setTimeout(() => newItem.classList.remove('opacity-0'), 100);

            // Scroll effect
            if (log.children.length > 3) {
                log.style.transform = `translateY(-${(log.children.length - 3) * 32}px)`;
            }

            currentStatusIndex++;
            setTimeout(updateStatus, 3000 + Math.random() * 2000);
        }

        setTimeout(updateStatus, 2000);

        // Particle Stream Micro-interaction
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'data-stream-particle';
            const container = document.querySelector('main');
            container.appendChild(particle);

            const startX = window.innerWidth / 2 + (Math.random() - 0.5) * 400;
            const startY = window.innerHeight + 10;
            const duration = 2000 + Math.random() * 3000;

            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';

            particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 1 },
                { transform: `translateY(-${window.innerHeight + 100}px) scale(0)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            }).onfinish = () => particle.remove();
        }

        setInterval(createParticle, 200);
    </script>
